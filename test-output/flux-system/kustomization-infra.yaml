apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: test-project-infra
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: test-project
  path: ./infrastructure
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
  - name: test-project
